<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>确认删除</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #f1f5f9; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
}
.card {
    background: #1e293b; border: 1px solid #334155; border-radius: 6px;
    padding: 2.5rem; max-width: 420px; width: 90%; text-align: center;
}
.card h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem; }
.card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; }
.buttons { display: flex; gap: 0.75rem; justify-content: center; }
.btn {
    padding: 0.5rem 1.5rem; border-radius: 6px; font-size: 14px; font-weight: 500;
    border: none; cursor: pointer; text-decoration: none; display: inline-block;
}
.btn-danger { background: #dc2626; color: white; }
.btn-danger:hover { background: #b91c1c; }
.btn-cancel { background: transparent; color: #94a3b8; border: 1px solid #334155; }
.btn-cancel:hover { color: #f1f5f9; border-color: #64748b; }
.spinner { display: none; margin: 1rem 0; }
.spinner.show { display: block; }
.spinner::after {
    content: " "; display: block; width: 24px; height: 24px;
    border: 3px solid #334155; border-top: 3px solid #2563eb;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.msg { margin-top: 1rem; font-size: 0.85rem; display: none; }
.msg.error { display: block; color: #f87171; }
.msg.success { display: block; color: #4ade80; }
</style>
</head>
<body>
<div class="card">
    <h2>确认删除</h2>
    <p>确定要删除该拜访计划吗？<br>关联的反馈记录也将一并删除，此操作不可撤销。</p>
    <div class="buttons">
        <button class="btn btn-cancel" onclick="cancel()">取消</button>
        <button class="btn btn-danger" onclick="confirmDel()">确认删除</button>
    </div>
    <div class="spinner" id="spinner"></div>
    <div class="msg" id="msg"></div>
</div>
<script>
const params = new URLSearchParams(location.search);
const planId = params.get("plan_id");
const token = params.get("token");
const redirect = params.get("redirect") || "";

function doRedirect() {
    let url = redirect;
    if (token && !url.includes("token=")) url += (url.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(token);
    window.location.href = url;
}

function cancel() { doRedirect(); }

async function confirmDel() {
    document.querySelector("#spinner").classList.add("show");
    document.querySelector(".btn-danger").disabled = true;
    try {
        const resp = await fetch("/api/plans/" + planId, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        });
        if (resp.ok) {
            document.querySelector("#msg").className = "msg success";
            document.querySelector("#msg").textContent = "删除成功，正在返回...";
            setTimeout(doRedirect, 800);
        } else {
            const data = await resp.json();
            throw new Error(data.detail || "删除失败");
        }
    } catch (e) {
        document.querySelector("#msg").className = "msg error";
        document.querySelector("#msg").textContent = "删除失败：" + e.message;
        document.querySelector(".btn-danger").disabled = false;
    } finally {
        document.querySelector("#spinner").classList.remove("show");
    }
}
</script>
</body>
</html>
