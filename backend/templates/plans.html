<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拜访计划列表</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <div class="nav-links">
        <a id="back-home" href="http://localhost:8501/" target="_top"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><use href="/static/icons.svg#icon-arrow-left"/></svg> 返回主页</a>
    </div>
    <div class="header">
        <h1><svg class="icon icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><use href="/static/icons.svg#icon-list"/></svg> 拜访计划列表</h1>
        <p>查看和管理所有拜访计划</p>
    </div>
    <div id="content">
        <div class="empty-state"><p>加载中...</p></div>
    </div>
</div>

<script>
const API_BASE = window.location.origin;
const TOKEN = new URLSearchParams(location.search).get('token') || '';
document.addEventListener('DOMContentLoaded', function() {
    var el = document.getElementById('back-home');
    if (el && TOKEN) el.href += '?token=' + encodeURIComponent(TOKEN);
});
let allPlans = [];
let detailUrls = {};

async function loadPlans() {
    try {
        const resp = await fetch(`${API_BASE}/api/history`, {
            headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        allPlans = (await resp.json()).data || [];

        // 批量获取 detail_url
        const regNums = [...new Set(allPlans.map(p => p.reg_num).filter(Boolean))];
        if (regNums.length > 0) {
            try {
                const linkResp = await fetch(`${API_BASE}/api/fund-links`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reg_nums: regNums })
                });
                const linkData = await linkResp.json();
                detailUrls = linkData.data || {};
            } catch (e) {
                console.warn('获取机构链接失败:', e.message);
            }
        }

        render(allPlans);
    } catch (e) {
        document.getElementById('content').innerHTML =
            `<div class="empty-state"><p>加载失败：${e.message}</p></div>`;
    }
}

let sortStatus = ''; // '' = all, 'pending', 'completed', 'cancelled'

function sortPlans(plans, status) {
    sortStatus = status;
    let sorted = [...plans];
    if (status) {
        const matched = sorted.filter(p => p.status === status);
        const unmatched = sorted.filter(p => p.status !== status);
        matched.sort((a, b) => (b.planned_date || '').localeCompare(a.planned_date || ''));
        sorted = [...matched, ...unmatched];
    } else {
        sorted.sort((a, b) => (b.planned_date || '').localeCompare(a.planned_date || ''));
    }
    return sorted;
}

function render(plans) {
    const el = document.getElementById('content');
    if (plans.length === 0) {
        el.innerHTML = `<div class="empty-state">
            <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#64748b;margin-bottom:12px;"><use href="/static/icons.svg#icon-list"/></svg>
            <p>暂无拜访计划</p>
            <p style="font-size:13px;margin-top:8px;color:var(--text-muted, #64748b);">请在地图上添加私募 → 确认提交后即可查看</p>
        </div>`;
        return;
    }

    const pending = plans.filter(p => p.status === 'pending').length;
    const completed = plans.filter(p => p.status === 'completed').length;
    const cancelled = plans.filter(p => p.status === 'cancelled').length;

    const statusMap = {
      pending: '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#d97706;vertical-align:middle"><use href="/static/icons.svg#icon-clock"/></svg> 待拜访',
      completed: '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#16a34a;vertical-align:middle"><use href="/static/icons.svg#icon-check"/></svg> 已完成',
      cancelled: '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#dc2626;vertical-align:middle"><use href="/static/icons.svg#icon-x"/></svg> 已取消',
    };
    const statusClass = { pending: 'status-pending', completed: 'status-completed', cancelled: 'status-cancelled' };

    const sorted = sortPlans(plans, sortStatus);

    el.innerHTML = `
        <div class="stats-row">
            <div class="stat-card ${sortStatus === '' ? 'active' : ''}" onclick="render(allPlans)">
                <div class="num">${plans.length}</div><div class="label">总计</div>
            </div>
            <div class="stat-card ${sortStatus === 'pending' ? 'active' : ''}" onclick="sortPlans(allPlans, 'pending'); render(allPlans);">
                <div class="num" style="color:var(--warning-text, #fcd34d);">${pending}</div><div class="label">待拜访</div>
            </div>
            <div class="stat-card ${sortStatus === 'completed' ? 'active' : ''}" onclick="sortPlans(allPlans, 'completed'); render(allPlans);">
                <div class="num" style="color:var(--success-text, #4ade80);">${completed}</div><div class="label">已完成</div>
            </div>
            <div class="stat-card ${sortStatus === 'cancelled' ? 'active' : ''}" onclick="sortPlans(allPlans, 'cancelled'); render(allPlans);">
                <div class="num" style="color:var(--danger-text, #f87171);">${cancelled}</div><div class="label">已取消</div>
            </div>
        </div>
        <div style="overflow-x:auto;">
        <table>
            <thead><tr>
                <th>拜访计划</th><th>机构名称</th><th>登记编号</th><th>管理规模</th><th>计划日期</th><th>拜访人</th><th>状态</th><th>操作</th><th>查看</th>
            </tr></thead>
            <tbody>
            ${sorted.map(p => {
                const hasFeedback = p.feedback_id != null;
                const detailUrl = detailUrls[p.reg_num] || '';
                const isStarred = p.starred === true || p.starred === 'true' || p.starred === 't';
                const starHtml = isStarred ? '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="currentColor" style="color:var(--warning-text, #fcd34d);vertical-align:middle;margin-right:2px"><use href="/static/icons.svg#icon-star"/></svg>' : '';
                const orgDisplay = starHtml + p.org_name;
                const orgNameHtml = detailUrl
                    ? `<a href="${detailUrl}" target="_blank" style="color:#93c5fd;text-decoration:none;">${orgDisplay}</a>`
                    : orgDisplay;
                const hasBatch = p.batch_id != null && p.batch_id !== '';
                const batchUrl = hasBatch ? `http://localhost:8501/batch_detail?batch_id=${p.batch_id}&token=${TOKEN}` : '';
                const batchDisplay = hasBatch ? `${p.planned_date || ''}#${p.batch_id}` : '-';
                return `
                <tr>
                    <td data-label="拜访计划">${hasBatch ? `<a href="${batchUrl}" target="_blank" style="color:#93c5fd;text-decoration:none;">${batchDisplay}</a>` : '-'}</td>
                    <td data-label="机构名称">${orgNameHtml}</td>
                    <td data-label="登记编号">${p.reg_num}</td>
                    <td data-label="管理规模">${p.org_aum || '-'}</td>
                    <td data-label="计划日期">${p.planned_date || '-'}</td>
                    <td data-label="拜访人">${p.visitor_name || '-'}</td>
                    <td data-label="状态"><span class="${statusClass[p.status] || ''}">${statusMap[p.status] || p.status}</span></td>
                    <td data-label="操作">
                        ${hasFeedback
                            ? `<span class="feedback-done"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-check"/></svg> 已反馈</span>`
                            : `<a class="feedback-link" href="/feedback?token=${TOKEN}&amp;plan_id=${p.id}" target="_blank">填写反馈</a>`
                        }
                    </td>
                    <td data-label="查看">
                        <a class="feedback-link" href="/detail?token=${TOKEN}&amp;reg_num=${p.reg_num}" target="_blank">查看</a>
                    </td>
                </tr>`;
            }).join('')}
            </tbody>
        </table>
        </div>
    `;
}

loadPlans();
</script>
</body>
</html>
