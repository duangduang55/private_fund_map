<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拜访计划列表</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0f; color: #e0e0e0; min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
.header {
    text-align: center; margin-bottom: 2rem;
}
.header h1 {
    font-size: 1.8rem; font-weight: 700; color: #00d4aa;
    text-shadow: 0 0 20px rgba(0,212,170,0.3); margin-bottom: 0.3rem;
}
.header p { color: #6b7280; font-size: 0.9rem; margin-bottom: 1rem; }
.nav-links { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
.nav-links a {
    color: #00d4aa; text-decoration: none; font-size: 14px; padding: 6px 16px;
    border: 1px solid rgba(0,212,170,0.3); border-radius: 20px; transition: all 0.2s;
}
.nav-links a:hover { background: rgba(0,212,170,0.1); }
.stats-row {
    display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap;
}
.stat-card {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 1px solid rgba(0,212,170,0.15); border-radius: 10px;
    padding: 0.8rem 1.5rem; text-align: center; min-width: 120px;
}
.stat-card .num { font-size: 1.5rem; font-weight: 700; color: #00d4aa; }
.stat-card .label { font-size: 12px; color: #6b7280; margin-top: 2px; }
.filter-bar {
    display: flex; gap: 0.8rem; margin-bottom: 1rem; flex-wrap: wrap;
}
.filter-bar select, .filter-bar input {
    padding: 8px 12px; border-radius: 8px;
    border: 1px solid rgba(0,212,170,0.2); background: rgba(26,26,46,0.95);
    color: #e0e0e0; font-size: 13px; outline: none;
}
.filter-bar select:focus, .filter-bar input:focus { border-color: #00d4aa; }
table { width: 100%; border-collapse: collapse; }
thead th {
    background: rgba(0,212,170,0.08); color: #00d4aa; font-size: 12px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(0,212,170,0.15);
}
tbody td {
    padding: 10px 12px; border-bottom: 1px solid rgba(0,212,170,0.06);
    font-size: 13px; color: #e0e0e0;
}
tbody tr:hover { background: rgba(0,212,170,0.04); }
.status-pending { color: #fbbf24; }
.status-completed { color: #34d399; }
.status-cancelled { color: #ef4444; }
.feedback-link {
    color: #0ea5e9; text-decoration: none; font-size: 12px;
    padding: 4px 10px; border-radius: 4px;
    border: 1px solid rgba(14,165,233,0.3); transition: all 0.2s;
    display: inline-block;
}
.feedback-link:hover { background: rgba(14,165,233,0.1); }
.feedback-done { color: #34d399; font-size: 12px; }
.empty-state {
    text-align: center; padding: 3rem 1rem; color: #6b7280;
}
.footer { text-align: center; color: #4b5563; font-size: 0.75rem; padding: 2rem 0; }
@media (max-width: 700px) {
    table, thead, tbody, th, td, tr { display: block; }
    thead tr { position: absolute; top: -9999px; left: -9999px; }
    tbody td { padding: 8px 12px; border-bottom: 1px solid rgba(0,212,170,0.08); }
    tbody td:before {
        content: attr(data-label); display: inline-block; width: 80px;
        font-weight: 600; color: #00d4aa; font-size: 12px;
    }
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 拜访计划列表</h1>
        <p>查看和管理所有拜访计划</p>
    </div>
    <div id="content">
        <div class="empty-state"><p>加载中...</p></div>
    </div>
</div>

<script>
const API_BASE = window.location.origin;
const TOKEN = new URLSearchParams(location.search).get('token') || '';

async function loadPlans() {
    try {
        const resp = await fetch(`${API_BASE}/api/history`, {
            headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        const plans = (await resp.json()).data || [];
        render(plans);
    } catch (e) {
        document.getElementById('content').innerHTML =
            `<div class="empty-state"><p>加载失败：${e.message}</p></div>`;
    }
}

function render(plans) {
    const el = document.getElementById('content');
    if (plans.length === 0) {
        el.innerHTML = `<div class="empty-state">
            <p style="font-size:32px;margin-bottom:12px;">📋</p>
            <p>暂无拜访计划</p>
            <p style="font-size:13px;margin-top:8px;color:#6b7280;">请在地图上添加私募 → 确认提交后即可查看</p>
        </div>`;
        return;
    }

    const pending = plans.filter(p => p.status === 'pending').length;
    const completed = plans.filter(p => p.status === 'completed').length;
    const cancelled = plans.filter(p => p.status === 'cancelled').length;

    const statusMap = { pending: '⏳ 待拜访', completed: '✅ 已完成', cancelled: '❌ 已取消' };
    const statusClass = { pending: 'status-pending', completed: 'status-completed', cancelled: 'status-cancelled' };

    el.innerHTML = `
        <div class="stats-row">
            <div class="stat-card"><div class="num">${plans.length}</div><div class="label">总计</div></div>
            <div class="stat-card"><div class="num" style="color:#fbbf24;">${pending}</div><div class="label">待拜访</div></div>
            <div class="stat-card"><div class="num" style="color:#34d399;">${completed}</div><div class="label">已完成</div></div>
            <div class="stat-card"><div class="num" style="color:#ef4444;">${cancelled}</div><div class="label">已取消</div></div>
        </div>
        <div style="overflow-x:auto;">
        <table>
            <thead><tr>
                <th>机构名称</th><th>登记编号</th><th>管理规模</th><th>计划日期</th><th>拜访人</th><th>状态</th><th>操作</th>
            </tr></thead>
            <tbody>
            ${plans.map(p => {
                const hasFeedback = p.feedback_id != null;
                return `
                <tr>
                    <td data-label="机构名称">${p.org_name}</td>
                    <td data-label="登记编号">${p.reg_num}</td>
                    <td data-label="管理规模">${p.org_aum || '-'}</td>
                    <td data-label="计划日期">${p.planned_date || '-'}</td>
                    <td data-label="拜访人">${p.visitor_name || '-'}</td>
                    <td data-label="状态"><span class="${statusClass[p.status] || ''}">${statusMap[p.status] || p.status}</span></td>
                    <td data-label="操作">
                        ${hasFeedback
                            ? `<span class="feedback-done">✅ 已反馈</span>`
                            : `<a class="feedback-link" href="/feedback?token=${TOKEN}&plan_id=${p.id}" target="_blank">填写反馈</a>`
                        }
                    </td>
                </tr>`;
            }).join('')}
            </tbody>
        </table>
        </div>
    `;
}

loadPlans();
</script>
</body>
</html>
