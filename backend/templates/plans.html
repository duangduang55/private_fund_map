<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拜访计划列表</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #f1f5f9; min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
.header {
    text-align: center; margin-bottom: 2rem;
}
.header h1 {
    font-size: 1.6rem; font-weight: 600; color: #f1f5f9; margin-bottom: 0.3rem;
}
.header p { color: #64748b; font-size: 0.9rem; margin-bottom: 1rem; }
.nav-links { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; }
.nav-links a {
    color: #93c5fd; text-decoration: none; font-size: 14px; padding: 6px 16px;
    border: 1px solid #475569; border-radius: 4px;
}
.nav-links a:hover { background: rgba(59,130,246,0.08); }
.stats-row {
    display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap;
}
.stat-card {
    background: #1e293b; border: 1px solid #334155; border-radius: 6px;
    padding: 0.8rem 1.5rem; text-align: center; min-width: 120px;
    cursor: pointer; transition: border-color 0.15s;
}
.stat-card:hover { border-color: #3b82f6; }
.stat-card.active { border-color: #3b82f6; background: rgba(37,99,235,0.08); }
.stat-card .num { font-size: 1.5rem; font-weight: 600; color: #f1f5f9; }
.stat-card .label { font-size: 12px; color: #64748b; margin-top: 2px; }
.filter-bar {
    display: flex; gap: 0.8rem; margin-bottom: 1rem; flex-wrap: wrap;
}
.filter-bar select, .filter-bar input {
    padding: 8px 12px; border-radius: 6px;
    border: 1px solid #475569; background: #1e293b;
    color: #f1f5f9; font-size: 13px; outline: none;
}
.filter-bar select:focus, .filter-bar input:focus { border-color: #3b82f6; }
table { width: 100%; border-collapse: collapse; }
thead th {
    background: rgba(37,99,235,0.08); color: #93c5fd; font-size: 12px;
    font-weight: 500; padding: 10px 12px; text-align: left; border-bottom: 1px solid #334155;
}
tbody td {
    padding: 10px 12px; border-bottom: 1px solid rgba(51,65,85,0.4);
    font-size: 13px; color: #f1f5f9;
}
tbody tr:hover { background: rgba(59,130,246,0.04); }
.status-pending { color: #d97706; }
.status-completed { color: #16a34a; }
.status-cancelled { color: #dc2626; }
.feedback-link {
    color: #93c5fd; text-decoration: none; font-size: 12px;
    padding: 4px 10px; border-radius: 4px;
    border: 1px solid rgba(59,130,246,0.3);
    display: inline-block;
}
.feedback-link:hover { background: rgba(59,130,246,0.08); }
.feedback-done { color: #16a34a; font-size: 12px; }
.empty-state {
    text-align: center; padding: 3rem 1rem; color: #64748b;
}
.footer { text-align: center; color: #475569; font-size: 0.75rem; padding: 2rem 0; }
@media (max-width: 700px) {
    table, thead, tbody, th, td, tr { display: block; }
    thead tr { position: absolute; top: -9999px; left: -9999px; }
    tbody td { padding: 8px 12px; border-bottom: 1px solid #334155; }
    tbody td:before {
        content: attr(data-label); display: inline-block; width: 80px;
        font-weight: 500; color: #94a3b8; font-size: 12px;
    }
}
</style>
</head>
<body>
<div class="container">
    <div class="nav-links">
        <a id="back-home" href="http://localhost:8501/" target="_top">← 返回主页</a>
    </div>
    <div class="header">
        <h1>📋 拜访计划列表</h1>
        <p>查看和管理所有拜访计划</p>
    </div>
    <div id="content">
        <div class="empty-state"><p>加载中...</p></div>
    </div>
</div>

<script>
const API_BASE = window.location.origin;
const TOKEN = new URLSearchParams(location.search).get('token') || '';
document.addEventListener('DOMContentLoaded', function() {
    var el = document.getElementById('back-home');
    if (el && TOKEN) el.href += '?token=' + encodeURIComponent(TOKEN);
});
let allPlans = [];
let detailUrls = {};

async function loadPlans() {
    try {
        const resp = await fetch(`${API_BASE}/api/history`, {
            headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        allPlans = (await resp.json()).data || [];

        // 批量获取 detail_url
        const regNums = [...new Set(allPlans.map(p => p.reg_num).filter(Boolean))];
        if (regNums.length > 0) {
            try {
                const linkResp = await fetch(`${API_BASE}/api/fund-links`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reg_nums: regNums })
                });
                const linkData = await linkResp.json();
                detailUrls = linkData.data || {};
            } catch (e) {
                console.warn('获取机构链接失败:', e.message);
            }
        }

        render(allPlans);
    } catch (e) {
        document.getElementById('content').innerHTML =
            `<div class="empty-state"><p>加载失败：${e.message}</p></div>`;
    }
}

let sortStatus = ''; // '' = all, 'pending', 'completed', 'cancelled'

function sortPlans(plans, status) {
    sortStatus = status;
    let sorted = [...plans];
    if (status) {
        const matched = sorted.filter(p => p.status === status);
        const unmatched = sorted.filter(p => p.status !== status);
        matched.sort((a, b) => (b.planned_date || '').localeCompare(a.planned_date || ''));
        sorted = [...matched, ...unmatched];
    } else {
        sorted.sort((a, b) => (b.planned_date || '').localeCompare(a.planned_date || ''));
    }
    return sorted;
}

function render(plans) {
    const el = document.getElementById('content');
    if (plans.length === 0) {
        el.innerHTML = `<div class="empty-state">
            <p style="font-size:32px;margin-bottom:12px;">📋</p>
            <p>暂无拜访计划</p>
            <p style="font-size:13px;margin-top:8px;color:#6b7280;">请在地图上添加私募 → 确认提交后即可查看</p>
        </div>`;
        return;
    }

    const pending = plans.filter(p => p.status === 'pending').length;
    const completed = plans.filter(p => p.status === 'completed').length;
    const cancelled = plans.filter(p => p.status === 'cancelled').length;

    const statusMap = { pending: '⏳ 待拜访', completed: '✅ 已完成', cancelled: '❌ 已取消' };
    const statusClass = { pending: 'status-pending', completed: 'status-completed', cancelled: 'status-cancelled' };

    const sorted = sortPlans(plans, sortStatus);

    el.innerHTML = `
        <div class="stats-row">
            <div class="stat-card ${sortStatus === '' ? 'active' : ''}" onclick="render(allPlans)">
                <div class="num">${plans.length}</div><div class="label">总计</div>
            </div>
            <div class="stat-card ${sortStatus === 'pending' ? 'active' : ''}" onclick="sortPlans(allPlans, 'pending'); render(allPlans);">
                <div class="num" style="color:#fbbf24;">${pending}</div><div class="label">待拜访</div>
            </div>
            <div class="stat-card ${sortStatus === 'completed' ? 'active' : ''}" onclick="sortPlans(allPlans, 'completed'); render(allPlans);">
                <div class="num" style="color:#34d399;">${completed}</div><div class="label">已完成</div>
            </div>
            <div class="stat-card ${sortStatus === 'cancelled' ? 'active' : ''}" onclick="sortPlans(allPlans, 'cancelled'); render(allPlans);">
                <div class="num" style="color:#ef4444;">${cancelled}</div><div class="label">已取消</div>
            </div>
        </div>
        <div style="overflow-x:auto;">
        <table>
            <thead><tr>
                <th>拜访计划</th><th>机构名称</th><th>登记编号</th><th>管理规模</th><th>计划日期</th><th>拜访人</th><th>状态</th><th>操作</th><th>查看</th>
            </tr></thead>
            <tbody>
            ${sorted.map(p => {
                const hasFeedback = p.feedback_id != null;
                const detailUrl = detailUrls[p.reg_num] || '';
                const isStarred = p.starred === true || p.starred === 'true' || p.starred === 't';
                const starHtml = isStarred ? '<span style="color:#fbbf24;margin-right:2px;">⭐</span>' : '';
                const orgDisplay = starHtml + p.org_name;
                const orgNameHtml = detailUrl
                    ? `<a href="${detailUrl}" target="_blank" style="color:#93c5fd;text-decoration:none;">${orgDisplay}</a>`
                    : orgDisplay;
                const hasBatch = p.batch_id != null && p.batch_id !== '';
                const batchUrl = hasBatch ? `http://localhost:8501/batch_detail?batch_id=${p.batch_id}&token=${TOKEN}` : '';
                const batchDisplay = hasBatch ? `${p.planned_date || ''}#${p.batch_id}` : '-';
                return `
                <tr>
                    <td data-label="拜访计划">${hasBatch ? `<a href="${batchUrl}" target="_blank" style="color:#93c5fd;text-decoration:none;">${batchDisplay}</a>` : '-'}</td>
                    <td data-label="机构名称">${orgNameHtml}</td>
                    <td data-label="登记编号">${p.reg_num}</td>
                    <td data-label="管理规模">${p.org_aum || '-'}</td>
                    <td data-label="计划日期">${p.planned_date || '-'}</td>
                    <td data-label="拜访人">${p.visitor_name || '-'}</td>
                    <td data-label="状态"><span class="${statusClass[p.status] || ''}">${statusMap[p.status] || p.status}</span></td>
                    <td data-label="操作">
                        ${hasFeedback
                            ? `<span class="feedback-done">✅ 已反馈</span>`
                            : `<a class="feedback-link" href="/feedback?token=${TOKEN}&amp;plan_id=${p.id}" target="_blank">填写反馈</a>`
                        }
                    </td>
                    <td data-label="查看">
                        <a class="feedback-link" href="/detail?token=${TOKEN}&amp;reg_num=${p.reg_num}" target="_blank">查看</a>
                    </td>
                </tr>`;
            }).join('')}
            </tbody>
        </table>
        </div>
    `;
}

loadPlans();
</script>
</body>
</html>
