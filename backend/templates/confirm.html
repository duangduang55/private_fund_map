<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>确认拜访计划</title>
<link rel="stylesheet" href="/static/style.css">
<style>
/* Page-specific overrides */
.header { display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; }
.header h1, .header p { width: 100%; }
.container { max-width: 750px; }

.card-info { flex: 1; }
.empty-state p { font-size: 16px; }

@media print {
  .card { display: flex; align-items: flex-start; }
  .card:first-of-type { border-top: 1px solid #2563eb; }
}
</style>
</head>
<body>
<div class="container" id="app">
    <div class="no-print" style="display:flex;gap:0.8rem;justify-content:center;margin-bottom:0.5rem;">
        <a id="back-home" href="http://localhost:8501/" target="_top" style="color:#93c5fd;text-decoration:none;font-size:13px;padding:5px 14px;border:1px solid #475569;border-radius:4px;"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-arrow-left"/></svg> 返回主页</a>
    </div>
    <div class="header no-print">
        <h1>确认拜访计划</h1>
        <p>检查待拜访清单，填写计划信息后提交</p>
    </div>
    <div id="content">
        <div class="empty-state"><p>加载中...</p></div>
    </div>
</div>

<script>
const API_BASE = window.location.origin;
const TOKEN = new URLSearchParams(location.search).get('token') || '';
document.addEventListener('DOMContentLoaded', function() {
    var el = document.getElementById('back-home');
    if (el && TOKEN) el.href += '?token=' + encodeURIComponent(TOKEN);
});
const URL_PARAMS = new URLSearchParams(location.search);
const PRODUCT_KEYWORDS = (URL_PARAMS.get('product_name_query') || '').split(/[,\s]+/).filter(Boolean);
const EXEC_KEYWORDS = (URL_PARAMS.get('executive_query') || '').split(/[,\s]+/).filter(Boolean);
let cartItems = [];
let matchReasons = {};

async function loadCart() {
    try {
        const resp = await fetch(`${API_BASE}/api/cart`, {
            headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        cartItems = (await resp.json()).data || [];
        if (cartItems.length > 0 && (PRODUCT_KEYWORDS.length > 0 || EXEC_KEYWORDS.length > 0)) {
            await fetchMatchReasons();
        }
        render();
    } catch (e) {
        document.getElementById('content').innerHTML =
            `<div class="empty-state"><p>加载失败：${e.message}</p></div>`;
    }
}

async function fetchMatchReasons() {
    try {
        const resp = await fetch(`${API_BASE}/api/match-reasons`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                reg_nums: cartItems.map(i => i.reg_num),
                product_keywords: PRODUCT_KEYWORDS,
                executive_keywords: EXEC_KEYWORDS,
            })
        });
        const result = await resp.json();
        matchReasons = result.data || {};
    } catch (e) {
        console.warn('获取命中原因失败:', e.message);
    }
}

function getMatchHtml(regNum) {
    const reasons = matchReasons[regNum];
    if (!reasons) return '';

    const product = reasons.product_match;
    const executive = reasons.executive_match;

    if (!product && !executive) return '';

    let tags = '';
    if (product) tags += `<span class="match-tag product">产品名命中</span>`;
    if (executive) tags += `<span class="match-tag executive">高管履历命中</span>`;
    return `<div class="match-reason">${tags}</div>`;
}

function render() {
    const el = document.getElementById('content');
    if (cartItems.length === 0) {
        el.innerHTML = `<div class="empty-state">
            <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#64748b;margin-bottom:12px;"><use href="/static/icons.svg#icon-list"/></svg>
            <p>待拜访清单为空</p>
            <p style="font-size:13px;margin-top:8px;color:var(--text-muted, #64748b);">请在地图上添加私募到待拜访清单</p>
            <button class="btn btn-primary no-print" style="margin-top:16px;max-width:200px;" onclick="window.close()">关闭页面</button>
        </div>`;
        return;
    }

    const hasKeywords = PRODUCT_KEYWORDS.length > 0 || EXEC_KEYWORDS.length > 0;

    let html = `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:1rem;">
        <span class="count-badge">共 ${cartItems.length} 条</span>
        <button class="btn-export-pdf no-print" onclick="exportPdf()"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-document"/></svg> 导出 PDF</button>
    </div>`;

    // 打印页头（打印时显示）
    html += `<div class="print-header">
        <h1>私募拜访计划清单</h1>
        <div class="print-sub">待拜访私募机构清单 · ${new Date().toLocaleDateString('zh-CN')}</div>
        <div class="print-meta">共 ${cartItems.length} 家机构</div>
    </div>`;

    cartItems.forEach(item => {
        const matchHtml = getMatchHtml(item.reg_num);
        const starred = item.starred === true || item.starred === 'true';
        html += `<div class="card" style="${starred ? 'border-left:3px solid var(--warning-text, #fcd34d);' : ''}">
            <div class="card-info">
                <div class="card-name">
                    <span class="star-toggle no-print" onclick="toggleStar(${item.id})" style="cursor:pointer;${starred ? 'color:var(--warning-text, #fcd34d);' : 'color:#64748b;'}font-size:16px;margin-right:4px;">${starred
                      ? '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><use href="/static/icons.svg#icon-star"/></svg>'
                      : '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-star-outline"/></svg>'}</span>
                    ${item.org_name}
                </div>
                <div class="card-detail">${item.reg_num}</div>
                <div class="card-detail-row">
                    <span><span class="label">管理规模</span> <span class="value">${item.org_aum || '-'}</span></span>
                    <span><span class="label">基金数量</span> <span class="value">${item.fund_count || '-'}</span></span>
                </div>
                <div class="card-detail"><span class="label">办公地址</span> <span class="value">${item.office_address || '-'}</span></div>
                ${matchHtml}
            </div>
            <button class="card-remove no-print" onclick="removeItem(${item.id})" style="background:none;border:none;color:var(--danger-text, #f87171);cursor:pointer;font-size:13px;padding:6px 10px;border-radius:6px;flex-shrink:0;"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-trash"/></svg> 删除</button>
        </div>`;
    });

    html += `
    <div class="no-print" style="margin-top:1.5rem;border-top:1px solid var(--border-default, #334155);padding-top:1.5rem;">
        <div class="form-row">
            <div class="form-group">
                <label>计划拜访日期</label>
                <input type="date" id="plan-date">
            </div>
            <div class="form-group">
                <label>拜访人</label>
                <input type="text" id="plan-visitor" placeholder="填写拜访人姓名">
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="window.close()"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-map-pin"/></svg> 返回地图</button>
            <button class="btn btn-pdf" onclick="exportPdf()"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-document"/></svg> 导出 PDF</button>
            <button class="btn btn-primary" id="submit-btn" onclick="submitPlan()"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-check"/></svg> 确认提交</button>
        </div>
    </div>`;

    el.innerHTML = html;
    const dateInput = document.getElementById('plan-date');
    if (dateInput) dateInput.valueAsDate = new Date();
}

function exportPdf() {
    window.print();
}

async function removeItem(id) {
    try {
        const resp = await fetch(`${API_BASE}/api/cart/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        if ((await resp.json()).success) {
            cartItems = cartItems.filter(i => i.id !== id);
            render();
        }
    } catch (e) {
        alert('删除失败：' + e.message);
    }
}

async function toggleStar(id) {
    try {
        const resp = await fetch(`${API_BASE}/api/cart/toggle-star/${id}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        if ((await resp.json()).success) {
            // 更新本地 cartItems 中的 starred 状态
            const item = cartItems.find(i => i.id === id);
            if (item) item.starred = !item.starred;
            render();
        }
    } catch (e) {
        alert('操作失败：' + e.message);
    }
}

async function submitPlan() {
    const date = document.getElementById('plan-date').value;
    const visitor = document.getElementById('plan-visitor').value.trim();
    if (!date) { alert('请选择拜访日期'); return; }
    if (!visitor) { alert('请填写拜访人姓名'); return; }

    // 保存当前购物车数据（提交后购物车会被清空）
    const savedItems = cartItems.slice();

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = '提交中...';

    try {
        const resp = await fetch(`${API_BASE}/api/plans/confirm`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
            body: JSON.stringify({ planned_date: date, visitor_name: visitor })
        });
        const result = await resp.json();
        if (result.success) {
            // 用保存的数据 + API 返回的计划信息构建完整卡片
            const planRegNums = {};
            (result.data || []).forEach(p => { planRegNums[p.reg_num] = p; });

            let plansHtml = savedItems.map(item => {
                const plan = planRegNums[item.reg_num] || {};
                const matchHtml = getMatchHtml(item.reg_num);
                const starred = item.starred === true || item.starred === 'true';
                return `<div class="card" style="${starred ? 'border-left:3px solid var(--warning-text, #fcd34d);' : ''}">
                    <div class="card-info">
                        <div class="card-name">${starred ? '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="currentColor" style="color:var(--warning-text, #fcd34d);vertical-align:middle"><use href="/static/icons.svg#icon-star"/></svg> ' : ''}${item.org_name}</div>
                        <div class="card-detail">${item.reg_num}</div>
                        <div class="card-detail-row">
                            <span><span class="label">管理规模</span> <span class="value">${item.org_aum || '-'}</span></span>
                            <span><span class="label">基金数量</span> <span class="value">${item.fund_count || '-'}</span></span>
                        </div>
                        <div class="card-detail"><span class="label">办公地址</span> <span class="value">${item.office_address || '-'}</span></div>
                        ${matchHtml}
                        <div class="card-detail" style="margin-top:4pt;"><span class="label">计划拜访</span> <span class="value">${plan.planned_date || date} | ${plan.visitor_name || visitor}</span></div>
                    </div>
                    <span style="color:#d97706;font-size:13px;flex-shrink:0;"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-clock"/></svg> 待拜访</span>
                </div>`;
            }).join('');

            document.getElementById('content').innerHTML = `
                <div class="print-header">
                    <h1>私募拜访计划清单</h1>
                    <div class="print-sub">已提交 · 拜访人 ${visitor} · 计划日期 ${date}</div>
                    <div class="print-meta">共 ${result.count} 条拜访计划 · 生成时间 ${new Date().toLocaleString('zh-CN')}</div>
                </div>
                <div class="no-print" style="margin-bottom:1.5rem;">
                    <div class="success-msg" style="padding:1.5rem 1rem;">
                        <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#16a34a;width:36px;height:36px;margin-bottom:12px;"><use href="/static/icons.svg#icon-check-circle"/></svg>
                        <h2 style="font-size:1.3rem;">提交成功！</h2>
                        <p>已生成 ${result.count} 条拜访计划</p>
                    </div>
                </div>
                ${plansHtml}
                <div class="btn-row no-print">
                    <button class="btn btn-secondary" onclick="window.open('http://localhost:8501/?token=${TOKEN}','_blank')"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-arrow-left"/></svg> 返回主页</button>
                    <button class="btn btn-primary" onclick="window.open('/plans?token=${TOKEN}','_blank')"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-list"/></svg> 查看全部计划</button>
                    <button class="btn btn-pdf" onclick="window.print()"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-document"/></svg> 导出 PDF</button>
                </div>
            `;
        } else {
            alert('提交失败');
            btn.disabled = false; btn.innerHTML = '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-check"/></svg> 确认提交';
        }
    } catch (e) {
        alert('提交失败：' + e.message);
        btn.disabled = false; btn.innerHTML = '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-check"/></svg> 确认提交';
    }
}

loadCart();
</script>
</body>
</html>
