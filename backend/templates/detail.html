<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私募拜访记录详情</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <div id="content">
        <div class="loading"><p>加载中...</p></div>
    </div>
</div>

<script>
const API_BASE = window.location.origin;
const TOKEN = '{{ token }}';
const REG_NUM = '{{ reg_num }}';

async function loadProfile() {
    if (!REG_NUM) {
        document.getElementById('content').innerHTML = '<div class="loading"><p>缺少机构编号</p></div>';
        return;
    }

    try {
        const resp = await fetch(`${API_BASE}/api/fund-profile/${REG_NUM}`, {
            headers: { 'Authorization': `Bearer ${TOKEN}` }
        });
        if (!resp.ok) {
            throw new Error(resp.status === 401 ? '请先登录' : '加载失败');
        }
        const data = await resp.json();
        render(data);
    } catch (e) {
        document.getElementById('content').innerHTML =
            `<div class="empty-state"><p>${e.message}</p></div>`;
    }
}

function render(data) {
    const fund = data.fund || {};
    const tags = data.tags || [];
    const visits = data.visits || [];

    const el = document.getElementById('content');
    const statusMap = {
      pending: '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#d97706;vertical-align:middle"><use href="/static/icons.svg#icon-clock"/></svg> 待拜访',
      completed: '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#16a34a;vertical-align:middle"><use href="/static/icons.svg#icon-check"/></svg> 已完成',
      cancelled: '<svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#dc2626;vertical-align:middle"><use href="/static/icons.svg#icon-x"/></svg> 已取消',
    };

    // 导航链接
    let html = `
    <div class="nav-links">
        <a href="http://localhost:8501/?token=${TOKEN}" target="_top"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-arrow-left"/></svg> 返回主页</a>
        <a href="/plans?token=${TOKEN}" target="_blank"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-list"/></svg> 计划列表</a>
        <a href="/map?token=${TOKEN}" target="_blank"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-map-pin"/></svg> 返回地图</a>
    </div>

    <div class="header">
        <h1>${fund.org_name || REG_NUM}</h1>
        <p>拜访记录详情</p>
    </div>

    <!-- 基本信息 -->
    <div class="info-card">
        <h3>基本信息</h3>
        <div class="info-row">
            <span class="label">机构名称</span>
            <span class="value">${fund.detail_url ? `<a href="${fund.detail_url}" target="_blank">${fund.org_name || '-'}</a>` : (fund.org_name || '-')}</span>
        </div>
        <div class="info-row">
            <span class="label">登记编号</span>
            <span class="value">${REG_NUM}</span>
        </div>
        <div class="info-row">
            <span class="label">管理规模</span>
            <span class="value">${fund.org_aum || '-'}</span>
        </div>
        <div class="info-row">
            <span class="label">基金数量</span>
            <span class="value">${fund.fund_count != null ? fund.fund_count : '-'}</span>
        </div>
        <div class="info-row">
            <span class="label">办公地址</span>
            <span class="value">${fund.office_address || '-'}</span>
        </div>
        ${tags.length > 0 ? `
        <div class="info-row">
            <span class="label">标签记录</span>
            <div class="tag-row">
                ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
        </div>` : ''}
    </div>`;

    // 拜访记录
    html += `
    <div class="info-card">
        <h3>拜访记录（${visits.length} 条）</h3>`;

    if (visits.length === 0) {
        html += `<div style="color:#64748b;text-align:center;padding:1.5rem;">暂无拜访记录</div>`;
    } else {
        visits.forEach(v => {
            const statusClass = v.status === 'completed' ? 'status-completed' : (v.status === 'cancelled' ? 'status-cancelled' : 'status-pending');
            html += `
            <div class="visit-card">
                <div class="visit-header">
                    <div>
                        <span class="visit-date"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-clock"/></svg> ${v.planned_date || '-'}</span>
                        <span style="margin:0 8px;color:#475569;">|</span>
                        <span class="visit-visitor"><svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="vertical-align:middle"><use href="/static/icons.svg#icon-user"/></svg> ${v.visitor_name || '-'}</span>
                    </div>
                    <span class="status-badge ${statusClass}">${statusMap[v.status] || v.status}</span>
                </div>`;

            // 已完成 - 显示反馈
            if (v.status === 'completed' && v.feedback_id) {
                html += `
                <div class="feedback-section">
                    <div class="fb-row">
                        <div class="fb-label">拜访结果</div>
                        <div class="fb-value">${v.visit_status || '-'}</div>
                    </div>
                    ${v.summary ? `
                    <div class="fb-row">
                        <div class="fb-label">摘要</div>
                        <div class="fb-value">${v.summary}</div>
                    </div>` : ''}
                    ${v.communication_detail ? `
                    <div class="fb-row">
                        <div class="fb-label">沟通详情</div>
                        <div class="fb-value">${v.communication_detail}</div>
                    </div>` : ''}
                    ${v.follow_up_suggestions ? `
                    <div class="fb-row">
                        <div class="fb-label">后续建议</div>
                        <div class="fb-value">${v.follow_up_suggestions}</div>
                    </div>` : ''}
                    ${v.tags && v.tags.length > 0 ? `
                    <div class="fb-row">
                        <div class="fb-label">标签</div>
                        <div class="fb-tags">
                            ${v.tags.map(t => `<span class="fb-tag">${t}</span>`).join('')}
                        </div>
                    </div>` : ''}
                </div>`;
            }

            // 已取消 - 显示原因
            if (v.status === 'cancelled') {
                html += `
                <div class="feedback-section">
                    <div class="cancel-reason">取消原因：${v.remark || '未填写'}</div>
                </div>`;
            }

            // 待拜访
            if (v.status === 'pending') {
                html += `
                <div class="feedback-section" style="color:#64748b;font-size:13px;">
                    待拜访
                </div>`;
            }

            html += `</div>`;
        });
    }

    html += `</div>
    <div class="footer">私募基金拓客辅助系统</div>`;

    el.innerHTML = html;
}

loadProfile();
</script>
</body>
</html>
